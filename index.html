<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誠信檢驗站</title>
    
    <!-- 標準化：連結外部圖示與 Manifest 檔案 -->
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background: #2B2D42;
            color: #333;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: #EDF2F4;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 頂部儀表板 */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #118AB2;
            color: white;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stat-box {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .time-warning { color: #FFD166 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 中央輸送帶與檢驗區 */
        #play-area {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(
                0deg,
                #dee2e6,
                #dee2e6 20px,
                #ced4da 20px,
                #ced4da 40px
            );
            /* 輸送帶動畫 */
            animation: moveBelt 2s linear infinite;
        }

        @keyframes moveBelt {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* 掃描器外框 */
        .scanner-frame {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 8px solid #118AB2;
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 雷射掃描線 */
        .laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(239, 71, 111, 0.8);
            box-shadow: 0 0 10px #EF476F;
            animation: scan 1.5s ease-in-out infinite alternate;
            z-index: 6;
        }

        @keyframes scan {
            0% { top: 10px; }
            100% { top: 260px; }
        }

        /* 物品圖示與文字 */
        .item-emoji {
            font-size: 100px;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }
        
        .item-name {
            font-size: 28px;
            font-weight: 900;
            color: #2B2D42;
            text-align: center;
            padding: 0 10px;
            line-height: 1.2;
        }

        .item-tag {
            font-size: 18px;
            color: #EF476F;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 底部雙按鈕區 */
        #controls {
            height: 140px;
            background: #2B2D42;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            z-index: 10;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        .action-btn {
            width: 45%;
            height: 90px;
            border: none;
            border-radius: 20px;
            font-size: 32px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 0px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .action-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px rgba(0,0,0,0.3);
        }

        .btn-reject { background: #EF476F; }
        .btn-reject:active { background: #d63d60; }
        
        .btn-approve { background: #06D6A0; }
        .btn-approve:active { background: #05b587; }

        /* 回饋文字動畫 */
        .feedback-stamp {
            position: absolute;
            font-size: 60px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transform: rotate(-15deg) scale(2);
        }

        @keyframes stampEffect {
            0% { opacity: 0; transform: rotate(-15deg) scale(2); }
            20% { opacity: 1; transform: rotate(-15deg) scale(1); }
            80% { opacity: 1; transform: rotate(-15deg) scale(1); }
            100% { opacity: 0; transform: rotate(-15deg) scale(0.5); }
        }

        /* 疊加畫面 (開始與結束) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 30; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { color: #118AB2; font-size: 48px; margin-bottom: 10px; line-height: 1.1; }
        .overlay p { font-size: 24px; font-weight: bold; line-height: 1.5; color: #444; margin-bottom: 30px; }

        .btn-start {
            background: #118AB2; color: white; border: none; padding: 15px 50px;
            font-size: 32px; font-weight: bold; border-radius: 40px; cursor: pointer;
            box-shadow: 0 6px 0 #0b698a; transition: all 0.1s;
        }
        .btn-start:active { transform: translateY(6px); box-shadow: 0 0px 0 #0b698a; }

        .rules-icons { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; width: 100%; align-items: center; }
        .rule-row { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 15px; border-radius: 15px; width: 90%; border: 3px solid #ccc; }
        .rule-emoji { font-size: 45px; margin-right: 15px; }
        .rule-text { font-size: 24px; font-weight: 900; text-align: left; flex-grow: 1; }

        .score-board { background: #f8f9fa; border: 4px dashed #118AB2; border-radius: 20px; padding: 20px 40px; margin: 20px 0; width: 80%; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="stat-box">🛡️ <span id="score-display">0</span> 分</div>
        <div class="stat-box" id="time-box">⏱️ <span id="time-display">30</span> 秒</div>
    </div>

    <div id="play-area">
        <div class="scanner-frame" id="scanner">
            <div class="laser"></div>
            <div class="item-emoji" id="item-emoji">❓</div>
            <div class="item-name" id="item-name">準備稽查</div>
            <div class="item-tag" id="item-tag"></div>
        </div>
        <!-- 回饋印章 -->
        <div class="feedback-stamp" id="feedback"></div>
    </div>

    <div id="controls">
        <button class="action-btn btn-reject" id="btn-reject">❌ 拒絕</button>
        <button class="action-btn btn-approve" id="btn-approve">✅ 合格</button>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="overlay">
        <h1>誠信檢驗站<br><span style="font-size: 32px; color: #EF476F;">倫理大考驗</span></h1>
        <p>你是一名專業的衛生稽查員！<br>請在 30 秒內快速判斷：</p>
        
        <div class="rules-icons">
            <div class="rule-row" style="border-color: #06D6A0;">
                <div class="rule-emoji">🍎🥛</div>
                <div class="rule-text" style="color: #06D6A0;">新鮮食材<br><span style="font-size:18px;">請按 ✅ 檢驗合格</span></div>
            </div>
            <div class="rule-row" style="border-color: #EF476F;">
                <div class="rule-emoji">🦠🛢️</div>
                <div class="rule-text" style="color: #EF476F;">黑心食品<br><span style="font-size:18px;">請按 ❌ 拒絕開罰</span></div>
            </div>
            <div class="rule-row" style="border-color: #FFD166;">
                <div class="rule-emoji">🧧📱</div>
                <div class="rule-text" style="color: #E76F51;">紅包與關說<br><span style="font-size:18px;">請按 ❌ 堅定拒絕！</span></div>
            </div>
        </div>
        
        <button id="btn-start-game" class="btn-start">開始值勤</button>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title">稽查結束</h1>
        <p id="end-message" style="color: #555;">評語</p>
        
        <div class="score-board">
            <div style="font-size: 24px; color: #555; margin-bottom: 10px;">本次總積分</div>
            <div style="font-size: 70px; color: #118AB2; font-weight: 900; line-height: 1;" id="final-score">0</div>
            <!-- 新增滿分顯示區塊 -->
            <div style="font-size: 22px; color: #888; margin-top: 15px; font-weight: bold;">
                ( 本局最高滿分：<span id="max-score">0</span> )
            </div>
        </div>

        <button id="btn-restart" class="btn-start" style="font-size: 26px;">再挑戰一次</button>
    </div>
</div>

<script>
    // === 音效系統 ===
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'correct') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'bonus') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'wrong') { 
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // === 遊戲資料 (題目庫) ===
    const ITEMS = [
        { emoji: '🍎', name: '在地小農蘋果', type: 'good' },
        { emoji: '🥬', name: '產銷履歷蔬菜', type: 'good' },
        { emoji: '🥩', name: '檢驗合格肉品', type: 'good' },
        { emoji: '🥛', name: '低溫保鮮鮮乳', type: 'good' },
        { emoji: '🥚', name: '無藥殘留雞蛋', type: 'good' },
        { emoji: '🦠', name: '過期發霉肉品', type: 'bad' },
        { emoji: '🧪', name: '不明化學色素', type: 'bad' },
        { emoji: '🛢️', name: '回收餿水廢油', type: 'bad' },
        { emoji: '🐛', name: '長滿蟲的麵粉', type: 'bad' },
        { emoji: '🧧', name: '業者偷塞的厚紅包', type: 'bribe' },
        { emoji: '📱', name: '高層長官關說電話', type: 'bribe' },
        { emoji: '🎁', name: '名貴中秋禮盒', type: 'bribe' }
    ];

    let score = 0;
    let maxPossibleScore = 0;
    let timeLeft = 30;
    let gameInterval;
    let isPlaying = false;
    let currentItem = null;
    let isAnimating = false;

    // DOM 元素
    const uiScore = document.getElementById('score-display');
    const uiTime = document.getElementById('time-display');
    const timeBox = document.getElementById('time-box');
    const scanner = document.getElementById('scanner');
    const itemEmoji = document.getElementById('item-emoji');
    const itemName = document.getElementById('item-name');
    const itemTag = document.getElementById('item-tag');
    const feedback = document.getElementById('feedback');
    const finalScoreDisplay = document.getElementById('final-score');
    const maxScoreDisplay = document.getElementById('max-score'); 
    
    // 綁定按鈕
    document.getElementById('btn-start-game').addEventListener('click', startGame);
    document.getElementById('btn-restart').addEventListener('click', showStartScreen);
    
    document.getElementById('btn-reject').addEventListener('pointerdown', function(e){ e.preventDefault(); handleChoice('reject'); });
    document.getElementById('btn-approve').addEventListener('pointerdown', function(e){ e.preventDefault(); handleChoice('approve'); });

    function showStartScreen() {
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        timeBox.classList.remove('time-warning');
    }

    function startGame() {
        initAudio();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        score = 0; 
        maxPossibleScore = 0; 
        timeLeft = 30; 
        isPlaying = true;
        updateUI();
        nextItem();
        
        gameInterval = setInterval(() => {
            timeLeft--; 
            updateUI();
            if (timeLeft <= 5) timeBox.classList.add('time-warning');
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function updateUI() {
        uiScore.innerText = score;
        uiTime.innerText = timeLeft;
    }

    function nextItem() {
        if (!isPlaying) return;
        isAnimating = false;
        
        let rand = Math.random();
        let targetType = rand > 0.8 ? 'bribe' : (rand > 0.4 ? 'bad' : 'good');
        let filteredItems = ITEMS.filter(item => item.type === targetType);
        currentItem = filteredItems[Math.floor(Math.random() * filteredItems.length)];

        if (currentItem.type === 'bribe') {
            maxPossibleScore += 20;
        } else {
            maxPossibleScore += 10;
        }

        itemEmoji.innerText = currentItem.emoji;
        itemName.innerText = currentItem.name;
        
        if (currentItem.type === 'bribe') {
            itemTag.innerText = "⚠️ 倫理陷阱！";
        } else {
            itemTag.innerText = "";
        }

        scanner.style.transform = 'scale(0.8) translateY(-50px)';
        scanner.style.opacity = '0';
        setTimeout(() => {
            scanner.style.transform = 'scale(1) translateY(0)';
            scanner.style.opacity = '1';
        }, 50);
    }

    function handleChoice(action) {
        if (!isPlaying || isAnimating || !currentItem) return;
        isAnimating = true;

        let isCorrect = false;
        let points = 0;
        let fbText = "";
        let fbColor = "";

        if (action === 'approve') {
            if (currentItem.type === 'good') {
                isCorrect = true; points = 10; fbText = "✅ 安全過關"; fbColor = "#06D6A0";
            } else {
                isCorrect = false; points = -10; fbText = "❌ 嚴重失職"; fbColor = "#EF476F";
            }
        } else if (action === 'reject') {
            if (currentItem.type === 'bad') {
                isCorrect = true; points = 10; fbText = "🛑 成功攔截"; fbColor = "#118AB2";
            } else if (currentItem.type === 'bribe') {
                isCorrect = true; points = 20; fbText = "✨ 廉能守法！"; fbColor = "#E76F51";
            } else {
                isCorrect = false; points = -10; fbText = "❌ 誤判好物"; fbColor = "#555";
            }
        }

        score += points;
        if (score < 0) score = 0; 
        updateUI();

        if (isCorrect && currentItem.type === 'bribe') playSound('bonus');
        else if (isCorrect) playSound('correct');
        else playSound('wrong');

        feedback.innerText = fbText;
        feedback.style.color = fbColor;
        feedback.style.textShadow = `2px 2px 0 #fff, -2px -2px 0 #fff, 0 0 10px ${fbColor}`;
        feedback.style.animation = 'none';
        void feedback.offsetWidth; 
        feedback.style.animation = 'stampEffect 0.8s ease-out forwards';

        if (action === 'approve') {
            scanner.style.transform = 'translateX(200px) rotate(20deg)';
        } else {
            scanner.style.transform = 'translateX(-200px) rotate(-20deg)';
        }
        scanner.style.opacity = '0';

        setTimeout(nextItem, 400);
    }

    function endGame() {
        isPlaying = false;
        clearInterval(gameInterval);
        document.getElementById('end-screen').classList.remove('hidden');
        
        finalScoreDisplay.innerText = score;
        maxScoreDisplay.innerText = maxPossibleScore;

        const endTitle = document.getElementById('end-title');
        const endMessage = document.getElementById('end-message');

        let ratio = maxPossibleScore > 0 ? score / maxPossibleScore : 0;

        if (ratio === 1 && score > 0) {
            endTitle.innerText = "👑 完美食安包公 👑"; 
            endTitle.style.color = "#FFD166";
            endTitle.style.textShadow = "0 0 20px rgba(255, 209, 102, 0.8)"; 
            endMessage.innerText = "滿分神人！你展現了無懈可擊的專業倫理與火眼金睛，一絲漏洞都逃不過你的法眼！";
        } else if (ratio >= 0.8) {
            endTitle.innerText = "🌟 廉能食安守護神"; 
            endTitle.style.color = "#E76F51";
            endTitle.style.textShadow = "none";
            endMessage.innerText = "太優秀了！你成功拒絕了誘惑，並高標準把關了食安！";
        } else if (ratio >= 0.4) {
            endTitle.innerText = "👍 稱職的稽查員"; 
            endTitle.style.color = "#118AB2";
            endTitle.style.textShadow = "none";
            endMessage.innerText = "表現不錯！繼續保持專業倫理與敏銳度！";
        } else {
            endTitle.innerText = "🚨 倫理與食安危機"; 
            endTitle.style.color = "#EF476F";
            endTitle.style.textShadow = "none";
            endMessage.innerText = "哎呀！不小心放水或是誤判了嗎？請再挑戰一次熟悉法規！";
        }
    }
</script>
</body>
</html>
