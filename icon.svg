<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- 科技感深色背景漸層 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#118AB2"/>
            <stop offset="100%" stop-color="#1B1C2A"/>
        </linearGradient>
        <!-- 放大鏡玻璃反光漸層 -->
        <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0.2"/>
        </linearGradient>
        <!-- 霓虹雷射發光效果 -->
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <!-- 3D 懸浮陰影 -->
        <filter id="dropShadow">
            <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <!-- 1. 圓角背景與科技網格 -->
    <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>
    <path d="M 0 100 L 512 100 M 0 200 L 512 200 M 0 300 L 512 300 M 0 400 L 512 400 M 100 0 L 100 512 M 200 0 L 200 512 M 300 0 L 300 512 M 400 0 L 400 512" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>

    <!-- 2. 放大鏡握柄 (金色與亮橘色點綴) -->
    <path d="M 340 340 L 460 460" stroke="#FFD166" stroke-width="50" stroke-linecap="round" filter="url(#dropShadow)"/>
    <path d="M 375 375 L 425 425" stroke="#E76F51" stroke-width="16" stroke-linecap="round"/>

    <!-- 3. 放大鏡本體 (毛玻璃質感與純白外框) -->
    <circle cx="220" cy="220" r="145" fill="url(#glassGrad)" filter="url(#dropShadow)"/>
    <circle cx="220" cy="220" r="145" fill="none" stroke="#ffffff" stroke-width="24"/>

    <!-- 4. 核心視覺：象徵合格的超大打勾 -->
    <path d="M 130 230 L 190 290 L 310 150" fill="none" stroke="#06D6A0" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)"/>

    <!-- 5. 遊戲特色：掃描雷射光束 (霓虹紅) -->
    <rect x="0" y="240" width="512" height="16" fill="#EF476F" filter="url(#neonGlow)"/>
    <circle cx="80" cy="248" r="8" fill="#fff" filter="url(#neonGlow)"/>
    <circle cx="256" cy="248" r="12" fill="#fff" filter="url(#neonGlow)"/>
    <circle cx="432" cy="248" r="8" fill="#fff" filter="url(#neonGlow)"/>

    <!-- 6. 廉能閃耀星光 -->
    <path d="M 80 100 Q 100 100 100 80 Q 100 100 120 100 Q 100 100 100 120 Q 100 100 80 100 Z" fill="#FFD166" filter="url(#dropShadow)"/>
    <path d="M 380 120 Q 395 120 395 105 Q 395 120 410 120 Q 395 120 395 135 Q 395 120 380 120 Z" fill="#06D6A0" filter="url(#dropShadow)"/>
</svg>